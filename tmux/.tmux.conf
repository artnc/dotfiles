# Reload config by running `tmux source-file ~/.tmux.conf`

# Pane splitting
unbind '"'
unbind %
bind | split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'

# Toggle micro editor on left half, existing layout scaled into right half
bind e run-shell '${HOME}/git/dotfiles/tmux/micro-toggle.sh'

# Return pre-2.1 mousing behaviour
# https://github.com/tmux/tmux/issues/145
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"
bind -n WheelDownPane select-pane -t= \; send-keys -M

# Window reordering
# https://superuser.com/questions/343572/how-do-i-reorder-tmux-windows
bind-key Left swap-window -t -1\; select-window -t -1
bind-key Right swap-window -t +1\; select-window -t +1

# Copy entire buffer to clipboard
bind-key C-y capture-pane -S - \; save-buffer /tmp/tmux-buffer \; run-shell "if command -v pbcopy >/dev/null; then pbcopy < /tmp/tmux-buffer; else xclip -selection clipboard < /tmp/tmux-buffer; fi" \; delete-buffer \; display-message "Buffer copied to clipboard"

# Settings
set -g allow-rename off
set -g base-index 1
set -g default-command /bin/zsh
set -g default-shell /bin/zsh
set -g display-panes-time 3000
set -g focus-events on
set -g history-limit 65536
set -g mouse on
set -g renumber-windows on
set -g status-interval 60
set -g status-left ''
set -g status-right '#(cat /etc/hostname).#(ip a | grep -oE "192\.168\.0\.[0-9]+/24" | cut -d. -f4 | cut -d/ -f1)'
# Status bar bg uses the dark host color; the mid tier colors the active pane
# border against the black bg; the light tier replaces tmux's default yellow
# behind black text on the active window name, copy-mode indicator/selection
# (mode-style), and status messages/command prompt (message-style)
run-shell 'c=$(${HOME}/git/dotfiles/tmux/host-color.sh); cm=$(${HOME}/git/dotfiles/tmux/host-color.sh mid); cl=$(${HOME}/git/dotfiles/tmux/host-color.sh light); tmux set -g status-style "bg=$c"; tmux set -g pane-active-border-style "fg=$cm"; tmux set -g window-status-current-style "bg=$cl,fg=colour16,bold"; tmux set -g mode-style "bg=$cl,fg=colour16"; tmux set -g message-style "bg=$cl,fg=colour16"'
# All panes inherit the terminal's black bg; inactive pane borders are a muted gray, the active border's color is set above from the host color
set -g pane-border-style 'fg=colour244'
# Use heavy box-drawing glyphs so the border lines look thicker
set -g pane-border-lines heavy
# http://stackoverflow.com/a/35513050
set -g window-status-format '#I #(echo #{b:pane_current_path} | sed "s/duolingo-\([a-z]\)/\1/")'
set -g window-status-current-format ' #(echo #{b:pane_current_path} | sed "s/duolingo-\([a-z]\)/\1/") '
set -g xterm-keys on
